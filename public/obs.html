<!DOCTYPE html>
<html>
<head><title>OBS Control</title></head>
<body>
<h1 id="status">Loading...</h1>
<script>
function obsCmd(requestType, requestId) {
  return new Promise((resolve, reject) => {
    const ws = new WebSocket('ws://127.0.0.1:4455');
    ws.onopen = () => {};
    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.op === 0) ws.send(JSON.stringify({op:1, d:{rpcVersion:1}}));
      if (data.op === 2) ws.send(JSON.stringify({op:6, d:{requestType, requestId}}));
      if (data.op === 7) { ws.close(); resolve(data.d); }
    };
    ws.onerror = () => reject('connection error');
    setTimeout(() => reject('timeout'), 5000);
  });
}

async function run() {
  const s = document.getElementById('status');
  const action = new URLSearchParams(location.search).get('action') || 'status';
  
  try {
    if (action === 'stop') {
      s.textContent = 'Stopping recording...';
      const r = await obsCmd('StopRecord', 'stop1');
      s.textContent = 'STOPPED! File: ' + (r.requestStatus.comment || 'saved');
      document.title = 'OBS_STOPPED';
    } else if (action === 'start') {
      s.textContent = 'Switching to Scene...';
      try { await obsCmd('SetCurrentProgramScene', 'scene1'); } catch(e) {}
      s.textContent = 'Starting recording...';
      const r = await obsCmd('StartRecord', 'start1');
      s.textContent = 'RECORDING!';
      document.title = 'OBS_RECORDING';
    } else {
      s.textContent = 'Getting status...';
      const r = await obsCmd('GetRecordStatus', 'stat1');
      s.textContent = 'Status: ' + JSON.stringify(r);
      document.title = 'OBS_STATUS';
    }
  } catch(e) {
    s.textContent = 'Error: ' + e;
    document.title = 'OBS_ERROR';
  }
}
run();
</script>
</body>
</html>
