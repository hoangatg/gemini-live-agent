<!DOCTYPE html>
<html>
<head><title>OBS Setup & Control</title></head>
<body>
<h1 id="status">Connecting to OBS...</h1>
<pre id="log" style="background:#111;color:#0f0;padding:20px;max-height:80vh;overflow:auto;font-size:14px;"></pre>
<script>
const log = document.getElementById('log');
const status = document.getElementById('status');
function addLog(msg) { log.textContent += msg + '\n'; }

const params = new URLSearchParams(location.search);
const action = params.get('action') || 'setup';

class OBSCtrl {
  constructor() { this.ws = null; this.reqId = 0; this.pending = {}; }
  
  connect() {
    return new Promise((resolve, reject) => {
      this.ws = new WebSocket('ws://127.0.0.1:4455');
      this.ws.onopen = () => addLog('WebSocket connected');
      this.ws.onerror = () => reject('Connection failed');
      this.ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.op === 0) { this.ws.send(JSON.stringify({op:1, d:{rpcVersion:1}})); }
        if (msg.op === 2) { addLog('Identified!'); resolve(); }
        if (msg.op === 7) {
          const id = msg.d.requestId;
          if (this.pending[id]) { this.pending[id](msg.d); delete this.pending[id]; }
        }
      };
    });
  }
  
  call(requestType, requestData) {
    return new Promise((resolve) => {
      const id = 'req_' + (++this.reqId);
      this.pending[id] = resolve;
      const msg = {op:6, d:{requestType, requestId: id}};
      if (requestData) msg.d.requestData = requestData;
      this.ws.send(JSON.stringify(msg));
    });
  }
}

async function run() {
  try {
    const obs = new OBSCtrl();
    await obs.connect();
    
    if (action === 'setup') {
      const scenes = await obs.call('GetSceneList');
      addLog('Scenes: ' + JSON.stringify(scenes.responseData.scenes.map(s=>s.sceneName)));
      addLog('Current: ' + scenes.responseData.currentProgramSceneName);
      try { await obs.call('CreateScene', {sceneName: 'DemoRecord'}); addLog('Created DemoRecord'); } catch(e) { addLog('DemoRecord exists'); }
      try { await obs.call('CreateInput', {sceneName:'DemoRecord',inputName:'ChromeCapture',inputKind:'window_capture',inputSettings:{window:'',capture_method:'auto',priority:1}}); addLog('Created ChromeCapture'); } catch(e) { addLog('ChromeCapture exists'); }
      await obs.call('SetCurrentProgramScene', {sceneName: 'DemoRecord'});
      addLog('Switched to DemoRecord');
      status.textContent = 'SETUP DONE'; document.title = 'OBS_SETUP_DONE';
      
    } else if (action === 'list-windows') {
      const props = await obs.call('GetInputPropertiesListPropertyItems', {inputName:'ChromeCapture',propertyName:'window'});
      addLog('Windows:\n' + JSON.stringify(props.responseData, null, 2));
      document.title = 'OBS_WINDOWS_LISTED';
      
    } else if (action === 'set-window') {
      const w = params.get('window') || '';
      await obs.call('SetInputSettings', {inputName:'ChromeCapture',inputSettings:{window:w}});
      addLog('Window set to: ' + w);
      document.title = 'OBS_WINDOW_SET';
      
    } else if (action === 'crop') {
      // Add crop filter to remove title bar
      const top = parseInt(params.get('top') || '80');
      const bottom = parseInt(params.get('bottom') || '0');
      const left = parseInt(params.get('left') || '0');
      const right = parseInt(params.get('right') || '0');
      
      // Remove existing crop filter first
      try { await obs.call('RemoveSourceFilter', {sourceName:'ChromeCapture',filterName:'CropTitleBar'}); addLog('Removed old crop'); } catch(e) {}
      
      // Add crop/pad filter
      await obs.call('CreateSourceFilter', {
        sourceName: 'ChromeCapture',
        filterName: 'CropTitleBar',
        filterKind: 'crop_filter',
        filterSettings: { top: top, bottom: bottom, left: left, right: right }
      });
      addLog('Crop filter added: top=' + top + ' bottom=' + bottom + ' left=' + left + ' right=' + right);
      status.textContent = 'CROP SET (top=' + top + ')';
      document.title = 'OBS_CROP_SET';
      
    } else if (action === 'start') {
      await obs.call('StartRecord');
      addLog('RECORDING STARTED!');
      status.textContent = 'RECORDING!'; document.title = 'OBS_RECORDING';
      
    } else if (action === 'stop') {
      const r = await obs.call('StopRecord');
      const path = r.responseData?.outputPath || 'saved';
      addLog('STOPPED! Output: ' + path);
      status.textContent = 'STOPPED! ' + path;
      document.title = 'OBS_STOPPED';
    }
  } catch(e) {
    status.textContent = 'Error: ' + e;
    addLog('ERROR: ' + JSON.stringify(e));
    document.title = 'OBS_ERROR';
  }
}
run();
</script>
</body>
</html>
